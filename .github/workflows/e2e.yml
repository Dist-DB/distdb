name: e2e

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/e2e.yml"
      - "scripts/e2e/**"
      - "server/**"
      - "serverlib/**"
      - "console/**"
      - "connector/**"
      - "common/**"
  pull_request:
    paths:
      - ".github/workflows/e2e.yml"
      - "scripts/e2e/**"
      - "server/**"
      - "serverlib/**"
      - "console/**"
      - "connector/**"
      - "common/**"

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run E2E suite
        run: bash scripts/e2e/run_all.sh

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts
          path: server/data/e2e
          if-no-files-found: ignore
          retention-days: 7
