name: non-functional-baseline

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"

concurrency:
  group: nonfunctional-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run non-functional baseline
        run: bash scripts/perf/nonfunctional_baseline.sh

      - name: Check non-functional regression thresholds
        run: bash scripts/perf/check_nonfunctional_thresholds.sh

      - name: Resolve non-functional artifact directory
        id: perf_artifacts
        run: |
          set -euo pipefail
          latest_perf_dir="$(ls -dt artifacts/perf/nonfunctional-baseline-* 2>/dev/null | head -n 1 || true)"
          if [[ -z "$latest_perf_dir" ]]; then
            latest_perf_dir="$(ls -dt server/data/perf/nonfunctional-baseline-* 2>/dev/null | head -n 1 || true)"
          fi
          if [[ -z "$latest_perf_dir" ]]; then
            echo "no non-functional artifact directory found"
            exit 1
          fi
          echo "latest_dir=$latest_perf_dir" >> "$GITHUB_OUTPUT"

      - name: Upload non-functional baseline artifacts
        uses: actions/upload-artifact@v4
        with:
          name: non-functional-baseline-${{ github.run_id }}
          path: ${{ steps.perf_artifacts.outputs.latest_dir }}
          if-no-files-found: error
