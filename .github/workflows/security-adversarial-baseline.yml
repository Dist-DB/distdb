name: security-adversarial-baseline

on:
  workflow_dispatch:
  schedule:
    - cron: "20 4 * * *"

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run adversarial security baseline
        run: bash scripts/security/security_adversarial_baseline.sh

      - name: Upload security baseline artifacts
        uses: actions/upload-artifact@v4
        with:
          name: security-adversarial-baseline-${{ github.run_id }}
          path: |
            artifacts/security/security-baseline-*/manifest.json
            artifacts/security/security-baseline-*/*.log
          if-no-files-found: error
