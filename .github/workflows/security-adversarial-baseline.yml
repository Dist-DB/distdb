name: security-adversarial-baseline

on:
  workflow_dispatch:
  schedule:
    - cron: "20 4 * * *"

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run adversarial security baseline
        run: bash scripts/security/security_adversarial_baseline.sh
