name: nightly-evidence

on:
  workflow_dispatch:
  schedule:
    - cron: "40 3 * * *"

concurrency:
  group: nightly-evidence-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build current binaries
        run: |
          set -euo pipefail
          (cd server && cargo build --quiet)
          (cd console && cargo build --quiet)

      - name: Run operability rolling restart and upgrade-safety matrix
        run: |
          set -euo pipefail
          for window_spec in "head-1:HEAD~1" "head-2:HEAD~2" "head-3:HEAD~3"; do
            window_label="${window_spec%%:*}"
            previous_ref="${window_spec#*:}"
            prev_tree="$RUNNER_TEMP/distdb-prev-$window_label"
            old_bin="$RUNNER_TEMP/server-old-$window_label"

            git worktree add --detach "$prev_tree" "$previous_ref"
            (cd "$prev_tree/server" && cargo build --quiet)
            cp "$prev_tree/server/target/debug/server" "$old_bin"
            git worktree remove --force "$prev_tree"

            DISTDB_SERVER_BIN_OLD="$old_bin" \
            DISTDB_SERVER_BIN_NEW="${GITHUB_WORKSPACE}/server/target/debug/server" \
            OPERABILITY_WINDOW_LABEL="$window_label" \
            OPERABILITY_OLD_REF="$previous_ref" \
            bash scripts/e2e/rolling_restart_upgrade_safety.sh
          done

      - name: Run split-brain evidence bundle
        run: bash scripts/e2e/split_brain_evidence_bundle.sh

      - name: Run adversarial security baseline
        run: bash scripts/security/security_adversarial_baseline.sh

      - name: Run non-functional baseline
        run: bash scripts/perf/nonfunctional_baseline.sh

      - name: Check non-functional regression thresholds
        run: bash scripts/perf/check_nonfunctional_thresholds.sh

      - name: Append artifact trend ledgers
        run: bash scripts/append_artifact_trends.sh

      - name: Check artifact evidence quality
        env:
          DISTDB_REQUIRE_OPERABILITY_WINDOW_MATRIX: "true"
          DISTDB_REQUIRED_OPERABILITY_WINDOWS: "head-1,head-2,head-3"
          DISTDB_REQUIRE_OPERABILITY_TREND_HISTORY: "true"
          DISTDB_OPERABILITY_TREND_MIN_ENTRIES: "3"
          DISTDB_REQUIRE_NONFUNCTIONAL_TREND_HISTORY: "true"
          DISTDB_NONFUNCTIONAL_TREND_MIN_ENTRIES: "3"
        run: bash scripts/check_artifact_evidence_quality.sh

      - name: Resolve nightly artifact directories
        id: nightly_artifacts
        run: |
          set -euo pipefail

          latest_e2e_dir="$(ls -dt artifacts/e2e/split-brain-evidence-* 2>/dev/null | head -n 1 || true)"
          latest_security_dir="$(ls -dt artifacts/security/security-baseline-* 2>/dev/null | head -n 1 || true)"
          latest_perf_dir="$(ls -dt artifacts/perf/nonfunctional-baseline-* 2>/dev/null | head -n 1 || true)"
          latest_operability_head1="$(ls -dt artifacts/e2e/rolling-upgrade-safety-head-1-* 2>/dev/null | head -n 1 || true)"
          latest_operability_head2="$(ls -dt artifacts/e2e/rolling-upgrade-safety-head-2-* 2>/dev/null | head -n 1 || true)"
          latest_operability_head3="$(ls -dt artifacts/e2e/rolling-upgrade-safety-head-3-* 2>/dev/null | head -n 1 || true)"

          [[ -n "$latest_e2e_dir" ]] || { echo "no split-brain artifact directory found"; exit 1; }
          [[ -n "$latest_security_dir" ]] || { echo "no security artifact directory found"; exit 1; }
          [[ -n "$latest_perf_dir" ]] || { echo "no non-functional artifact directory found"; exit 1; }
          [[ -n "$latest_operability_head1" ]] || { echo "no operability head-1 artifact directory found"; exit 1; }
          [[ -n "$latest_operability_head2" ]] || { echo "no operability head-2 artifact directory found"; exit 1; }
          [[ -n "$latest_operability_head3" ]] || { echo "no operability head-3 artifact directory found"; exit 1; }

          echo "latest_e2e_dir=$latest_e2e_dir" >> "$GITHUB_OUTPUT"
          echo "latest_security_dir=$latest_security_dir" >> "$GITHUB_OUTPUT"
          echo "latest_perf_dir=$latest_perf_dir" >> "$GITHUB_OUTPUT"
          echo "latest_operability_head1=$latest_operability_head1" >> "$GITHUB_OUTPUT"
          echo "latest_operability_head2=$latest_operability_head2" >> "$GITHUB_OUTPUT"
          echo "latest_operability_head3=$latest_operability_head3" >> "$GITHUB_OUTPUT"

      - name: Upload nightly evidence artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nightly-evidence-${{ github.run_id }}
          path: |
            ${{ steps.nightly_artifacts.outputs.latest_e2e_dir }}
            ${{ steps.nightly_artifacts.outputs.latest_security_dir }}
            ${{ steps.nightly_artifacts.outputs.latest_perf_dir }}
            ${{ steps.nightly_artifacts.outputs.latest_operability_head1 }}
            ${{ steps.nightly_artifacts.outputs.latest_operability_head2 }}
            ${{ steps.nightly_artifacts.outputs.latest_operability_head3 }}
            artifacts/trends/*.json
          if-no-files-found: error
